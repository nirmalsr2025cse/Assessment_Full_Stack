<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects - Bugify</title>
<link rel="icon" href="Bugify.png">
<link rel="stylesheet" href="project.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2><i class="fas fa-bug"></i> Bugify</h2>

        <ul>
        <li onclick="home()"><i class="fas fa-home"></i> Home</li>
        <li onclick="projects()"><i class="fas fa-folder"></i> Create Project</li>
        <li onclick="pending()"><i class="fas fa-clock"></i> Pending</li>
        <li class="active"><i class="fas fa-check-circle"></i> Completed</li>
        </ul>
    </div>
    <div class="main">
        <div class="projects-header">
            <h1>Completed Projects</h1>
            <input type="text" placeholder="Search your projects...">
        </div>
        <div class="projects-grid">
            <div class="project-card" onclick="Input()">
                <img src="Bug.jpg" class="thumb">
                <h3>Project 1</h3>
                <p>Created At : 2026-04-01</p>
            </div>
        </div>
    </div>
</div>
<script>
function Input(){
    window.location.href = "bug.html";
}
function projects(){
    window.location.href = "project.html";
}
function pending(){
    window.location.href = "pending.html";
}
function home(){
    window.location.href = "index.html";
}
</script>
</body>
</html>
